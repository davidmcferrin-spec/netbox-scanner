# netbox-scanner configuration (YAML).
# Copy to ~/.netbox-scanner.conf (user-wide, checked first) or ./config.yaml (project directory).
# Only one file is loaded; if both exist, the home file wins. Override with: --config /path/to/file.yaml
# Do not commit real API tokens if using ./config.yaml in a git checkout.

netbox:

  # NetBox API base URL.

  base_url: "https://netbox.example.com"

  # NetBox API token with read access to IP ranges and write access to IP addresses.
  # v1 (legacy): 40-char key — curl uses Authorization: Token <key>
  # v2 (NetBox 4.5+): nbt_<id>.<secret> — curl uses Authorization: Bearer <full-token>

  api_token: "replace-me"

  # HTTP timeout in seconds.

  timeout: 30

  # Delay in seconds between NetBox API calls (setup/plan only; use 0 for fast interactive setup).

  rate_limit: 0



checkmk:

  # Optional CheckMK 2.4+ REST integration (per-IP lookup during verified-host NetBox writes).

  enabled: false

  # Site base URL including any site path, e.g. https://checkmk.example.com/monitoring

  base_url: "https://checkmk.example.com/monitoring"

  automation_user: "automation"

  automation_secret: "replace-me"

  # NetBox tag slug to assign when CheckMK has a host for the IP (create in Extras → Tags first).

  tag_slug: "checkmk"

  timeout: 10

  rate_limit: 0

  verify_ssl: true



dns:

  # Optional custom recursive resolvers for PTR/A lookups.

  servers:

    - "1.1.1.1"

    - "8.8.8.8"

  # DNS lookup timeout in seconds.

  timeout: 2



logging:

  # Python log level.

  level: "INFO"

  # Log file for stdout/file dual logging and scheduled runs.

  file: "netbox-scanner.log"



scanner:

  # Default scan profile: services probes SSH, Telnet, HTTP/S, SMB, and SNMP only.

  default_profile: "services"

  # Default nmap timing (-T2 polite). Use sneaky or paranoid to reduce scan visibility.

  default_speed: "polite"

  # Delay in seconds between nmap scans per host.

  scan_rate_limit: 0.5

  # ICMP ping timeout in seconds. ICMP ping always runs before nmap on every IP.

  ping_timeout: 1

  # Unattended/scheduled runs: parent or standalone prefix CIDRs (parents expand to child prefixes).

  prefixes: []

  # Lock file while a scan is running (default: ~/.netbox-scanner.lock). Removed on normal exit or Ctrl+C.

  lock_file: ""

  # IP range names whose addresses are excluded from prefix scans (exact name match).

  skip_ranges:

    - "reserved-loopbacks"

    - "mgmt-excluded"

  # IP range roles whose address spans are excluded inside scan prefixes (not whole subnets).
  # Name or slug; case-insensitive (DHCP Pool, DHCP-Pool, dhcp-pool are equivalent). Set to [] to disable.

  skip_roles:

    - "DHCP Pool"   # also matches DHCP-Pool / dhcp-pool (case-insensitive)

  # Named scan profiles. Values can be port lists/ranges or raw nmap flags.

  profiles:

    # TCP 22, 23, 80, 443, 445 and UDP 161 (SNMP). Requires root/cap_net_raw for -sS/-sU.

    services:

      - "-sS"

      - "-sU"

      - "T:22,23,80,443,445,U:161"

    web:

      - "80"

      - "443"

      - "8080"

      - "8443"

    media:

      - "554"

      - "8554"

      - "1935"

    # Opt-in exhaustive scan only. Not used by default.

    full:

      - "1-65535"

    # SYN scan of the same service ports without UDP.

    stealth:

      - "-sS"

      - "T:22,23,80,443,445,8080,8443,544,1935,U:161"

